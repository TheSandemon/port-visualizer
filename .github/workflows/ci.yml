name: CI

on:
  push:
    branches: [main, upgrade]
  pull_request:

jobs:
  test-and-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Package (no publish)
        run: npx electron-builder --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: port-visualizer-win
          path: |
            release/*.exe
          retention-days: 14
